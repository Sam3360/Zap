<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>⚡Zap </title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#3b82f6" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══ CSS Variables ══ */
    :root {
      --bg:      #0a0f1e;
      --bg2:     #0f172a;
      --sidebar: #111827;
      --card:    #1e293b;
      --card2:   #162032;
      --panel:   #172033;
      --accent:  #3b82f6;
      --accent2: #60a5fa;
      --accent-glow: rgba(59,130,246,0.3);
      --green:   #22c55e;
      --red:     #ef4444;
      --yellow:  #f59e0b;
      --text:    #f1f5f9;
      --text2:   #cbd5e1;
      --muted:   #64748b;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --radius:  14px;
      --msg-me:  #1d4ed8;
      --msg-them:#1e293b;
      --nav-h:   60px;
      --sidebar-w: 260px;
      --right-w: 220px;
    }
    [data-theme="light"] {
      --bg:      #f0f4ff;
      --bg2:     #e8eef8;
      --sidebar: #dde5f5;
      --card:    #ffffff;
      --card2:   #f5f7ff;
      --panel:   #edf1fc;
      --text:    #0f172a;
      --text2:   #334155;
      --muted:   #64748b;
      --border:  rgba(0,0,0,0.08);
      --border2: rgba(0,0,0,0.14);
      --msg-me:  #3b82f6;
      --msg-them:#e2e8f0;
      --sidebar: #dde5f5;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

    /* ══ Layout Shell ══ */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ══ TOP NAVBAR ══ */
    #navbar {
      height: var(--nav-h); min-height: var(--nav-h);
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 18px; gap: 12px;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .nav-logo span { font-size: 1.4rem; }
    .nav-spacer { flex: 1; }
    .nav-btn {
      padding: 7px 14px; border-radius: 10px;
      border: 1px solid var(--border2); background: transparent;
      color: var(--text2); font-size: 0.82rem; cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-btn:hover { background: var(--card); color: var(--text); }
    .nav-btn.danger:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #f87171; }
    #nav-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--accent);
      background: var(--card); cursor: pointer;
    }
    #nav-username { font-weight: 600; font-size: 0.9rem; }
    .unread-badge {
      background: var(--red); color: #fff;
      font-size: 0.65rem; font-weight: 700;
      padding: 2px 6px; border-radius: 100px;
      min-width: 18px; text-align: center;
    }

    /* ══ MAIN BODY ══ */
    #main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    
    #messages-container { flex: 1; min-height: 0; }
    .msg-row, .msg-bubble-wrap, .msg-bubble { min-width: 0; }
    .msg-bubble-wrap { max-width: 70%; }
    .msg-bubble img.msg-image { max-width: 100%; height: auto; }

    @media (max-width: 1024px) {
      :root { --sidebar-w: 220px; --right-w: 180px; }
    }

    @media (max-width: 860px) {
      .msg-bubble-wrap { max-width: 100%; }
    }

    /* ══ LEFT SIDEBAR ══ */
    #sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow-y: auto; overflow-x: hidden;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .sidebar-section { padding: 14px 12px 6px; }
    .sidebar-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      padding: 0 6px; margin-bottom: 6px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      cursor: pointer; transition: background 0.15s, color 0.15s;
      font-size: 0.9rem; color: var(--text2);
      position: relative;
    }
    .sidebar-item:hover { background: var(--card); color: var(--text); }
    .sidebar-item.active { background: rgba(59,130,246,0.18); color: var(--accent2); font-weight: 600; }
    .sidebar-item .icon { font-size: 1.1rem; width: 22px; text-align: center; }
    .sidebar-item .item-badge {
      margin-left: auto; background: var(--red);
      color: #fff; font-size: 0.62rem; font-weight: 700;
      padding: 2px 6px; border-radius: 100px;
    }
    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 14px; }

    /* ══ CENTER CHAT AREA ══ */
    #chat-area {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: var(--bg2);
      position: relative;
    }

    /* Chat Header */
    #chat-header {
      padding: 14px 20px; background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    #chat-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; }
    #chat-subtitle { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
    #chat-online-count { margin-left: auto; font-size: 0.8rem; color: var(--green); font-weight: 500; }

    /* Messages */
    #messages-container {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    #messages-container::-webkit-scrollbar { width: 5px; }
    #messages-container::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .msg-day-divider {
      text-align: center; font-size: 0.72rem; color: var(--muted);
      margin: 10px 0; position: relative;
    }
    .msg-day-divider::before, .msg-day-divider::after {
      content: ''; position: absolute; top: 50%; height: 1px;
      background: var(--border); width: 38%;
    }
    .msg-day-divider::before { left: 0; }
    .msg-day-divider::after { right: 0; }

    .msg-row {
      display: flex; gap: 10px; align-items: flex-end;
      animation: msgIn 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }
    .msg-row.mine { flex-direction: row-reverse; }
    @keyframes msgIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform:none; } }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0; background: var(--card);
      align-self: flex-end;
    }

    .msg-bubble-wrap { max-width: 70%; display: flex; flex-direction: column; gap: 3px; }
    .msg-row.mine .msg-bubble-wrap { align-items: flex-end; }

    .msg-sender-name { font-size: 0.72rem; color: var(--accent2); font-weight: 600; margin-bottom: 2px; padding: 0 4px; }
    .msg-row.mine .msg-sender-name { display: none; }

    .msg-bubble {
      padding: 9px 14px; border-radius: 18px;
      background: var(--msg-them); color: var(--text);
      font-size: 0.92rem; line-height: 1.5;
      word-break: break-word; position: relative;
      border: 1px solid var(--border);
      transition: background 0.15s;
    }
    .msg-row.mine .msg-bubble {
      background: var(--msg-me); border-color: transparent;
      color: #fff;
    }
    .msg-bubble img.msg-image {
      max-width: 240px; max-height: 180px;
      border-radius: 10px; display: block; margin-top: 6px;
      cursor: zoom-in;
    }

    /* Reactions */
    .msg-reactions { display: flex; gap: 4px; flex-wrap: wrap; padding: 2px 4px; }
    .reaction-chip {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 100px; padding: 2px 8px;
      font-size: 0.78rem; cursor: pointer;
      transition: transform 0.1s, background 0.15s;
      display: flex; align-items: center; gap: 3px;
    }
    .reaction-chip:hover { background: var(--card2); transform: scale(1.1); }
    .reaction-chip.mine-reaction { background: rgba(59,130,246,0.2); border-color: var(--accent); }

    .msg-meta {
      display: flex; align-items: center; gap: 8px;
      padding: 0 4px;
    }
    .msg-time { font-size: 0.68rem; color: var(--muted); }
    * {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'DM Sans', Arial;
  overflow-x: hidden;
}
    .container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 15px;
  padding: 15px;
}
    @media (max-width: 768px) {

  body {
    font-size: 14px;
  }

  .container {
    grid-template-columns: 1fr;
    padding: 10px;
  }

  .card {
    padding: 15px;
    border-radius: 12px;
  }

  input, button {
    font-size: 16px;
  }

  #chatBox, #dmBox {
    height: 250px;
  }
}


    #chatBox, #dmBox {
  overflow-y: auto;
  max-height: 60vh;
  scroll-behavior: smooth;
}

    .inputRow {
  display: flex;
  gap: 10px;
}

.inputRow input {
  flex: 1;
}

.inputRow button {
  width: auto;
  padding: 12px 16px;
}
    button {
  min-height: 44px;
  cursor: pointer;
}

input {
  min-height: 44px;
}
    /* Context menu */
    .msg-actions {
      display: none; gap: 4px;
      position: absolute; right: -8px; top: -36px;
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 10px; padding: 4px;
      z-index: 10; white-space: nowrap;
    }
    .msg-bubble-wrap:hover .msg-actions { display: flex; }
    .msg-action-btn {
      padding: 4px 8px; border-radius: 6px;
      border: none; background: transparent;
      color: var(--text2); cursor: pointer; font-size: 0.82rem;
      transition: background 0.1s;
    }
    .msg-action-btn:hover { background: var(--bg2); }
    .msg-action-btn.del { color: #f87171; }

    /* Reaction picker */
    .reaction-picker {
      display: none; gap: 4px;
      padding: 6px 8px;
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 14px; position: absolute;
      right: 0; top: -60px; z-index: 20;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .reaction-picker button {
      font-size: 1.2rem; background: none; border: none;
      cursor: pointer; padding: 2px 4px; border-radius: 6px;
      transition: transform 0.1s, background 0.1s;
    }
    .reaction-picker button:hover { transform: scale(1.3); background: var(--bg2); }
    .show-picker .reaction-picker { display: flex; }

    /* Typing indicator */
    #typing-area {
      padding: 4px 20px; min-height: 22px;
      font-size: 0.78rem; color: var(--muted); font-style: italic;
    }
    .typing-dots { display: inline-flex; gap: 3px; align-items: center; margin-left: 4px; }
    .typing-dots span {
      width: 5px; height: 5px; background: var(--muted);
      border-radius: 50%; display: inline-block;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); opacity:0.4; }
      30% { transform: translateY(-5px); opacity:1; }
    }

    /* Input bar */
    #chat-input-area {
      padding: 12px 16px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex; align-items: flex-end; gap: 10px;
    }
    #msg-input {
      flex: 1; min-height: 40px; max-height: 120px;
      padding: 10px 16px; border-radius: 22px;
      border: 1px solid var(--border2);
      background: var(--bg2); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.93rem;
      outline: none; resize: none; line-height: 1.4;
      transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    .input-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: none; background: var(--card2); cursor: pointer;
      color: var(--muted); font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .input-btn:hover { background: var(--border2); color: var(--text); }
    #send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: none; background: var(--accent); cursor: pointer;
      color: #fff; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: var(--accent2); transform: scale(1.08); }
    #send-btn:active { transform: scale(0.95); }

    /* Emoji picker */
    #emoji-picker {
      display: none; position: absolute;
      bottom: 72px; left: 16px; z-index: 50;
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 16px; padding: 12px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
      width: 300px; max-height: 260px; overflow-y: auto;
    }
    #emoji-picker.open { display: block; animation: fadeUp 0.18s ease; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
    .emoji-grid { display: grid; grid-template-columns: repeat(8,1fr); gap: 2px; }
    .emoji-btn { font-size: 1.3rem; padding: 5px; border: none; background: none; cursor: pointer; border-radius: 6px; transition: background 0.1s, transform 0.1s; }
    .emoji-btn:hover { background: var(--bg2); transform: scale(1.2); }

    /* Image preview */
    #img-preview-wrap {
      display: none; padding: 8px 16px 0;
      background: var(--card); border-top: 1px solid var(--border);
    }
    #img-preview-wrap.show { display: flex; align-items: center; gap: 10px; }
    #img-preview { width: 64px; height: 64px; object-fit: cover; border-radius: 10px; }
    #img-cancel { background: none; border: none; color: var(--red); font-size: 1.2rem; cursor: pointer; }

    /* ══ RIGHT PANEL ══ */
    #right-panel {
      width: var(--right-w); min-width: var(--right-w);
      background: var(--sidebar);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    #right-panel::-webkit-scrollbar { width: 4px; }
    #right-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .panel-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 14px 16px 8px; }

    .online-user {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
      margin: 0 6px;
    }
    .online-user:hover { background: var(--card); }
    .online-avatar-wrap { position: relative; flex-shrink: 0; }
    .online-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: var(--card); }
    .online-dot {
      position: absolute; bottom: 0; right: 0;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--green); border: 2px solid var(--sidebar);
    }
    .online-dot.offline { background: var(--muted); }
    .online-name { font-size: 0.85rem; font-weight: 500; truncate: ellipsis; }

    /* ══ PANELS (Notes, DMs overlay) ══ */
    .panel-overlay {
      display: none; position: absolute; inset: 0;
      background: var(--bg2); z-index: 30;
      flex-direction: column;
    }
    .panel-overlay.open { display: flex; }

    .panel-header {
      padding: 14px 20px; background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .panel-back {
      background: none; border: none; color: var(--muted);
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center;
    }
    .panel-back:hover { color: var(--text); }
    .panel-body { flex: 1; overflow-y: auto; padding: 16px; }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* Notes */
    .note-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px;
      margin-bottom: 10px; position: relative;
      animation: msgIn 0.2s ease both;
    }
    .note-text { font-size: 0.9rem; line-height: 1.5; color: var(--text2); white-space: pre-wrap; }
    .note-time { font-size: 0.7rem; color: var(--muted); margin-top: 8px; }
    .note-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; }
    .note-del:hover { color: var(--red); }
    .note-input-row { display: flex; gap: 8px; }
    #note-input {
      flex: 1; padding: 10px 14px; border-radius: 12px;
      border: 1px solid var(--border2); background: var(--card);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      outline: none; resize: none; min-height: 44px;
    }
    #note-input:focus { border-color: var(--accent); }
    .btn-primary {
      padding: 10px 18px; border-radius: 12px;
      border: none; background: var(--accent);
      color: #fff; font-weight: 600; cursor: pointer;
      transition: background 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .btn-primary:hover { background: var(--accent2); }

    /* DM Panel */
    .dm-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 12px;
      cursor: pointer; transition: background 0.15s; margin-bottom: 4px;
    }
    .dm-row:hover { background: var(--card); }
    .dm-row.active { background: rgba(59,130,246,0.15); }
    .dm-row-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--card); }
    .dm-row-name { font-weight: 600; font-size: 0.88rem; }
    .dm-row-preview { font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
    .dm-unread { margin-left: auto; background: var(--red); color: #fff; font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 100px; }
    #dm-compose { padding: 12px 16px; border-top: 1px solid var(--border); }
    #dm-username-input {
      width: 100%; padding: 9px 14px; border-radius: 12px;
      border: 1px solid var(--border2); background: var(--card);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
      outline: none; margin-bottom: 8px;
    }
    #dm-username-input:focus { border-color: var(--accent); }

    /* Profile Modal */
    #profile-modal {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
    }
    #profile-modal.open { display: flex; }
    .profile-card {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 24px; padding: 32px;
      width: 100%; max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      animation: cardIn 0.3s ease;
    }
    @keyframes cardIn { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform:none; } }
    .profile-card h2 { font-family: 'Syne', sans-serif; font-size: 1.3rem; margin-bottom: 20px; }
    .profile-avatar-wrap { text-align: center; margin-bottom: 20px; }
    .profile-avatar-big { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); }
    .profile-field { margin-bottom: 12px; }
    .profile-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 5px; }
    .profile-input {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 1px solid var(--border2); background: var(--bg2);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      outline: none;
    }
    .profile-input:focus { border-color: var(--accent); }
    .profile-btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn-secondary {
      flex: 1; padding: 10px; border-radius: 12px;
      border: 1px solid var(--border2); background: transparent;
      color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .btn-secondary:hover { background: var(--bg2); }

    /* Toast */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 12px 18px; border-radius: 12px;
      background: var(--card); border: 1px solid var(--border2);

// ── Utilities ──
function toast(msg, type = 'info', duration = 3000) {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✕':'ℹ'}</span> ${msg}`;
  toastContainer.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

function formatTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const today = new Date(); today.setHours(0,0,0,0);
  const msgDay = new Date(d); msgDay.setHours(0,0,0,0);
  if (msgDay.getTime() === today.getTime()) return 'Today';
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  if (msgDay.getTime() === yesterday.getTime()) return 'Yesterday';
  return d.toLocaleDateString([], { month:'short', day:'numeric' });
}

function scrollToBottom(container) {
  if (container) container.scrollTop = container.scrollHeight;
}

function autoResizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function timestampToMillis(ts) {
  if (!ts) return 0;
  if (typeof ts === 'number') return ts;
  if (ts.toMillis) return ts.toMillis();
  return new Date(ts).getTime() || 0;
}

function getDisappearMs(settings = {}) {
  return Number(settings.disappearMs || settings.disappearingMs || 0);
}

function buildExpiresAt(disappearMs) {
  const ms = Number(disappearMs || 0);
  return ms > 0 ? new Date(Date.now() + ms) : null;
}

function isExpiredMessage(data) {
  const expiresAt = timestampToMillis(data?.expiresAt);
  return expiresAt > 0 && expiresAt <= Date.now();
}

function isRoomOwner(room) {
  return Boolean(room && currentUser && room.owner === currentUser.uid);
}

function isRoomMember(room) {
  if (!room || room.type !== 'private') return true;
  return Boolean(currentUser && (room.owner === currentUser.uid || room.members?.[currentUser.uid]));
}

function findRoom(roomId) {
  return rooms.find(room => room.id === roomId);
}

}

  if (snap.exists()) {
    currentUserData = snap.data();
    const storedUsername = localStorage.getItem('zap_username');

function slugifyRoomName(name) {
  return name.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40);
}

function readLocalRooms() {
  try {
    return JSON.parse(localStorage.getItem('zap_rooms') || '[]');
  } catch {
    return [];
  }
}

function saveLocalRooms(nextRooms) {
  localStorage.setItem('zap_rooms', JSON.stringify(nextRooms));
}

function mergeRooms(nextRooms) {
  const byId = new Map();
  [...DEFAULT_ROOMS, ...readLocalRooms(), ...nextRooms].forEach(room => {
    if (room?.id) byId.set(room.id, { icon: '#', name: room.id, type: 'public', joined: true, settings: {}, members: {}, ...room });
  });
  rooms = [...byId.values()].filter(room => room.type !== 'private' || room.joined).sort((a, b) => {
    const ai = DEFAULT_ROOMS.findIndex(r => r.id === a.id);
    const bi = DEFAULT_ROOMS.findIndex(r => r.id === b.id);
    if (ai !== -1 || bi !== -1) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    return (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0) || a.name.localeCompare(b.name);
  });
  saveLocalRooms(rooms.filter(room => room.joined).map(({ id, name, icon, type, joined, owner, members, settings }) => ({ id, name, icon, type, joined, owner, members, settings })));
  renderRooms();
  updateRoomHeaderControls();
}

function renderRooms() {
  roomsList.replaceChildren();
  rooms.forEach(room => {
    const item = document.createElement('div');
    item.className = `sidebar-item ${currentView === 'room' && currentRoom === room.id ? 'active' : ''}`;
    item.dataset.view = 'room';
    item.dataset.room = room.id;
    if (!room.joined) item.title = 'Click to join this room';

    const icon = document.createElement('span');
    icon.className = 'icon';
    icon.textContent = room.type === 'private' ? (room.icon || '🔒') : (room.icon || '#');

    const label = document.createElement('span');
    label.textContent = room.name || room.id;
    label.style.minWidth = '0';
    label.style.overflow = 'hidden';
    label.style.textOverflow = 'ellipsis';
    label.style.whiteSpace = 'nowrap';

    item.append(icon, label);
    if (room.type === 'private') {
      const lock = document.createElement('span');
      lock.className = 'room-lock';
      lock.textContent = 'Private';
      item.appendChild(lock);
    }
    if (!room.joined) {
      const join = document.createElement('span');
      join.className = 'item-badge';
      join.textContent = 'Join';
      item.appendChild(join);
    } else if (!DEFAULT_ROOMS.some(defaultRoom => defaultRoom.id === room.id)) {
      const leave = document.createElement('button');
      leave.className = 'group-leave';
      leave.type = 'button';
      leave.dataset.room = room.id;
      leave.title = 'Leave room';
      leave.textContent = '×';
      item.appendChild(leave);
    }
    roomsList.appendChild(item);
  });
}

async function initGroups() {
  mergeRooms([]);
  await loadUsersForPrivateGroups();
  groupCreateToggle.addEventListener('click', () => {
    groupCreateForm.classList.toggle('open');
    if (groupCreateForm.classList.contains('open')) groupNameInput.focus();
  });

  [groupPublicBtn, groupPrivateBtn].forEach(btn => {
    btn.addEventListener('click', () => {
      groupCreateType = btn.dataset.groupType;
      groupPublicBtn.classList.toggle('active', groupCreateType === 'public');
      groupPrivateBtn.classList.toggle('active', groupCreateType === 'private');
      groupUserSelect.classList.toggle('open', groupCreateType === 'private');
    });
  });

  groupCreateForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    const name = groupNameInput.value.trim();
    if (!name) return;
    const id = slugifyRoomName(name);
    if (!id) { toast('Use letters or numbers in the room name', 'error'); return; }
    const selectedMembers = getSelectedPrivateGroupMembers();
    const members = { [currentUser.uid]: true };
    selectedMembers.forEach(uid => { members[uid] = true; });
    const room = {
      id,
      name,
      icon: groupIconInput.value.trim() || '#',
      type: groupCreateType,
      owner: currentUser?.uid || '',
      createdBy: currentUser?.uid || '',
      createdAt: serverTimestamp(),
      members,
      settings: { disappearMs: 0 }
    };
    mergeRooms([{ id, name, icon: room.icon, type: room.type, owner: room.owner, members, settings: room.settings, joined: true }]);
    groupIconInput.value = '';
    groupNameInput.value = '';
    groupCreateType = 'public';
    groupPublicBtn.classList.add('active');
    groupPrivateBtn.classList.remove('active');
    groupUserSelect.classList.remove('open');
    groupUserSelect.querySelectorAll('input[type="checkbox"]').forEach(input => { input.checked = false; });
    groupCreateForm.classList.remove('open');
    try {
      await setDoc(doc(db, 'roomsMeta', id), room, { merge: true });
      toast('Room created', 'success');
    } catch (e) {
      toast('Room saved on this device', 'info');
    }
  });

  try {
    DEFAULT_ROOMS.forEach(defaultRoom => {
      setDoc(doc(db, 'roomsMeta', defaultRoom.id), {
        ...defaultRoom,
        builtIn: true,
        owner: 'system',
        members: currentUser ? { [currentUser.uid]: true } : {},
        settings: { disappearMs: 0 }
      }, { merge: true }).catch(() => {});
    });
    subscribeRoomsMeta();
  } catch (e) {
    mergeRooms([]);
  }
}

function subscribeRoomsMeta() {
  unsubRooms.forEach(unsub => unsub());
  unsubRooms = [];
  const remoteRoomsById = new Map();
  const applySnapshot = (snap) => {
    snap.forEach(d => {
      const data = d.data();
      const members = data.members || {};
      remoteRoomsById.set(d.id, {
        id: d.id,
        name: data.name || d.id,
        icon: data.icon || '#',
        type: data.type || 'public',
        owner: data.owner || data.createdBy || '',
        members,
        settings: data.settings || {},
        builtIn: Boolean(data.builtIn),
        createdAt: data.createdAt,
        joined: Boolean(data.builtIn || data.type !== 'private' || !currentUser || data.owner === currentUser.uid || members[currentUser.uid])
      });
    });
    mergeRooms([...remoteRoomsById.values()]);
  };
  unsubRooms.push(onSnapshot(query(collection(db, 'roomsMeta'), where('type', '==', 'public')), applySnapshot));
  unsubRooms.push(onSnapshot(query(collection(db, 'roomsMeta'), where(`members.${currentUser.uid}`, '==', true)), applySnapshot));
  unsubRooms.push(onSnapshot(query(collection(db, 'roomsMeta'), where('owner', '==', currentUser.uid)), applySnapshot));
}

async function loadUsersForPrivateGroups() {
  try {
    const snap = await getDocs(collection(db, 'users'));
    allUsers = snap.docs.map(d => ({ uid: d.id, ...d.data() })).filter(u => u.uid !== currentUser?.uid);
    renderPrivateInvitePicker();
  } catch {
    allUsers = [];
    renderPrivateInvitePicker();
  }
}

function renderPrivateInvitePicker() {
  groupUserSelect.replaceChildren();
  if (!allUsers.length) {
    const empty = document.createElement('div');
    empty.className = 'check-row';
    empty.textContent = 'No users available yet';
    groupUserSelect.appendChild(empty);
    return;
  }
  allUsers.forEach(user => {
    const label = document.createElement('label');
    label.className = 'check-row';
    const input = document.createElement('input');
    input.type = 'checkbox';
    input.value = user.uid;
    const name = document.createElement('span');
    name.textContent = user.username || user.displayName || user.email || 'User';
    label.append(input, name);
    groupUserSelect.appendChild(label);
  });
}

function getSelectedPrivateGroupMembers() {
  if (groupCreateType !== 'private') return [];
  return [...groupUserSelect.querySelectorAll('input[type="checkbox"]:checked')].map(input => input.value);
}

async function leaveRoom(roomId) {
  if (!roomId || DEFAULT_ROOMS.some(room => room.id === roomId)) return;
  const room = findRoom(roomId);
  if (room?.type === 'private' && room.owner === currentUser.uid) {
    toast('Transfer ownership or delete the group instead', 'error');
    return;
  }
  if (currentView === 'room' && currentRoom === roomId) {
    document.getElementById('nav-global')?.click();
  }
  const remainingLocalRooms = readLocalRooms().filter(room => room.id !== roomId);
  saveLocalRooms(remainingLocalRooms);
  rooms = rooms.filter(room => room.id !== roomId);
  renderRooms();
  try {
    await updateDoc(doc(db, 'roomsMeta', roomId), {
      [`members.${currentUser.uid}`]: deleteField()
    });
  } catch {}
}

async function joinRoom(roomId) {
  const room = rooms.find(r => r.id === roomId);
  if (!room || room.joined) return;
  if (room.type === 'private' && !isRoomMember(room)) {
    toast('This private group is invite-only', 'error');
    return;
  }
  room.joined = true;
  saveLocalRooms(rooms.filter(r => r.joined).map(({ id, name, icon, joined }) => ({ id, name, icon, joined })));
  renderRooms();
  try {
    await setDoc(doc(db, 'roomsMeta', roomId), {
      members: { [currentUser.uid]: true }
    }, { merge: true });
  } catch {}
}

function openGroupManageModal() {
  const room = findRoom(currentRoom);
  if (!room || !room.joined) return;
  const owner = isRoomOwner(room);
  manageGroupIcon.value = room.icon || '';
  manageGroupName.value = room.name || '';
  groupDisappearSelect.value = String(getDisappearMs(room.settings));
  manageGroupIcon.disabled = !owner;
  manageGroupName.disabled = !owner;
  manageGroupSave.disabled = !owner;
  groupAddUsername.disabled = !owner;
  groupAddMemberBtn.disabled = !owner;
  groupDeleteBtn.style.display = owner && !room.builtIn ? 'block' : 'none';
  renderGroupMembers(room);
  groupManageModal.classList.add('open');
}

function renderGroupMembers(room) {
  groupMemberList.replaceChildren();
  const memberIds = new Set(Object.keys(room.members || {}).filter(uid => room.members[uid]));
  if (room.owner) memberIds.add(room.owner);
  if (!memberIds.size && currentUser) memberIds.add(currentUser.uid);
  memberIds.forEach(uid => {
    const user = uid === currentUser.uid
      ? currentUserData
      : allUsers.find(u => u.uid === uid) || { username: uid };
    const row = document.createElement('div');
    row.className = 'member-row';
    const name = document.createElement('div');
    name.className = 'member-row-name';
    name.textContent = `${user.username || user.displayName || uid}${uid === room.owner ? ' · owner' : ''}`;
    row.appendChild(name);
    if (isRoomOwner(room) && uid !== room.owner) {
      const remove = document.createElement('button');
      remove.className = 'btn-secondary danger-text';
      remove.type = 'button';
      remove.textContent = 'Remove';
      remove.addEventListener('click', () => removeGroupMember(room.id, uid));
      row.appendChild(remove);
    }
    groupMemberList.appendChild(row);
  });
}

manageGroupSave.addEventListener('click', async () => {
  const room = findRoom(currentRoom);
  if (!isRoomOwner(room)) return;
  const name = manageGroupName.value.trim();
  const icon = manageGroupIcon.value.trim() || '#';
  if (!name) { toast('Group name required', 'error'); return; }
  const settings = { ...(room.settings || {}), disappearMs: Number(groupDisappearSelect.value || 0) };
  await setDoc(doc(db, 'roomsMeta', room.id), { name, icon, settings }, { merge: true });

// ── Message Subscription ──
function subscribeMessages() {
  if (unsubMessages) unsubMessages();
  if (unsubTyping) unsubTyping();

  let q;
  if (currentView === 'global') {
    q = query(collection(db, 'messages'), orderBy('timestamp', 'asc'), limit(100));
  } else {
    const room = findRoom(currentRoom);
    if (room?.type === 'private' && !isRoomMember(room)) {
      messagesContainer.innerHTML = '';
      msgInput.disabled = true;
      sendBtn.disabled = true;
      toast('You are not a member of this private group', 'error');
      return;
    }
    msgInput.disabled = false;
    sendBtn.disabled = false;
    q = query(collection(db, 'rooms', currentRoom, 'messages'), orderBy('timestamp', 'asc'), limit(100));
  }

  messagesContainer.innerHTML = '';
  let lastDate = '';
  let initialLoad = true;

  unsubMessages = onSnapshot(q, (snapshot) => {
    snapshot.docChanges().forEach(change => {
      if (change.type === 'added') {
        const data = change.doc.data();
        if (isExpiredMessage(data)) {
          const ref = currentView === 'global'
            ? doc(db, 'messages', change.doc.id)
            : doc(db, 'rooms', currentRoom, 'messages', change.doc.id);
          deleteDoc(ref).catch(() => {});
          return;
        }
        const msgDate = formatDate(data.timestamp);
        if (msgDate && msgDate !== lastDate) {
          lastDate = msgDate;
          const divider = document.createElement('div');
          divider.className = 'msg-day-divider'; divider.textContent = msgDate;
          messagesContainer.appendChild(divider);
        }
        renderMessage(change.doc.id, data, messagesContainer);
        scrollToBottom(messagesContainer);

        if (!initialLoad) {
          maybeNotifyMessage({ username: data.username, text: data.text || 'Image', uid: data.uid, type: currentView, room: currentRoom });
        }
      }
      if (change.type === 'removed') {
        const el = document.getElementById(`msg-${change.doc.id}`);
        if (el) el.remove();
      }
    });
    initialLoad = false;
  });

  // Typing indicator
  const typingColl = currentView === 'global'
    ? collection(db, 'typing')
    : collection(db, 'rooms', currentRoom, 'typing');
  unsubTyping = onSnapshot(typingColl, (snap) => {
    const typers = [];
    snap.forEach(d => {
      const td = d.data();
      if (td.uid !== currentUser.uid && Date.now() - (td.ts?.toMillis?.() || 0) < 5000) {
        typers.push(td.username);
      }
    });
    if (typers.length > 0) {
      typingArea.innerHTML = `${typers.join(', ')} ${typers.length > 1 ? 'are' : 'is'} typing <span class="typing-dots"><span></span><span></span><span></span></span>`;
    } else {
      typingArea.textContent = '';
    }
  });
}

function renderMessage(id, data, container) {
  const isMine = data.uid === currentUser.uid;
  const row = document.createElement('div');
  row.className = `msg-row ${isMine ? 'mine' : ''}`;
  row.id = `msg-${id}`;

  const avatarSrc = data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.username||'U')}&background=3b82f6&color=fff`;

  // Reactions summary
  const reactions = data.reactions || {};
  const reactionKeys = Object.keys(reactions);
  let reactionsHtml = '';
  if (reactionKeys.length > 0) {
    const counts = {};
    reactionKeys.forEach(uid => { const e = reactions[uid]; counts[e] = (counts[e]||0)+1; });
    reactionsHtml = `<div class="msg-reactions">` +
      Object.entries(counts).map(([emoji, count]) => {
        const myReaction = reactions[currentUser.uid] === emoji;
        return `<span class="reaction-chip ${myReaction?'mine-reaction':''}" data-emoji="${emoji}" data-msgid="${id}" title="${count} reaction${count>1?'s':''}">${emoji} ${count}</span>`;
      }).join('') + `</div>`;
  }

  const QUICK_REACTIONS = ['👍','❤️','😂','🔥','😮','😢'];
  const reactionPickerHtml = `<div class="reaction-picker">${QUICK_REACTIONS.map(e=>`<button data-emoji="${e}" data-msgid="${id}" class="react-btn">${e}</button>`).join('')}</div>`;

  row.innerHTML = `
    <img class="msg-avatar" src="${avatarSrc}" alt="${data.username||'U'}" />
    <div class="msg-bubble-wrap">
      ${!isMine ? `<div class="msg-sender-name">${data.username||'Unknown'}</div>` : ''}
      <div class="msg-bubble" style="position:relative;">
        <div class="msg-actions">
          <button class="msg-action-btn react-picker-toggle" data-msgid="${id}">😊</button>
          ${isMine ? `<button class="msg-action-btn del" data-msgid="${id}">🗑</button>` : ''}
        </div>
        ${reactionPickerHtml}
        ${data.text ? `<span class="msg-text">${escapeHtml(data.text)}</span>` : ''}
        ${data.imageUrl ? `<img class="msg-image" src="${data.imageUrl}" alt="image" />` : ''}
      </div>
      ${reactionsHtml}
      <div class="msg-meta">
        <span class="msg-time">${formatTime(data.timestamp)}</span>
      </div>
    </div>`;

  container.appendChild(row);

  // Delete
  row.querySelectorAll('.msg-action-btn.del').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Delete this message?')) return;
      try {
        if (currentView === 'global') await deleteDoc(doc(db, 'messages', btn.dataset.msgid));
        else await deleteDoc(doc(db, 'rooms', currentRoom, 'messages', btn.dataset.msgid));
        toast('Message deleted', 'success');
      } catch(e) { toast('Could not delete', 'error'); }
    });
  });

  // Reaction picker toggle
  row.querySelectorAll('.react-picker-toggle').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const bubble = btn.closest('.msg-bubble');
      bubble.classList.toggle('show-picker');
    });
  });

  // React buttons
  row.querySelectorAll('.react-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const emoji = btn.dataset.emoji;
      const msgId = btn.dataset.msgid;
      const ref = currentView === 'global'
        ? doc(db, 'messages', msgId)
        : doc(db, 'rooms', currentRoom, 'messages', msgId);
      await updateDoc(ref, { [`reactions.${currentUser.uid}`]: emoji });
      btn.closest('.msg-bubble').classList.remove('show-picker');
    });
  });

  // Reaction chips (toggle off)
  row.querySelectorAll('.reaction-chip').forEach(chip => {
    chip.addEventListener('click', async () => {
      const msgId = chip.dataset.msgid;
      const ref = currentView === 'global'
        ? doc(db, 'messages', msgId)
        : doc(db, 'rooms', currentRoom, 'messages', msgId);
      const snap = await getDoc(ref);
      if (!snap.exists()) return;
      const reactions = snap.data().reactions || {};
      if (reactions[currentUser.uid] === chip.dataset.emoji) {
        const update = { ...reactions };
        delete update[currentUser.uid];
        await updateDoc(ref, { reactions: update });
      }
    });
  });

  // Image zoom
  row.querySelectorAll('.msg-image').forEach(img => {
    img.addEventListener('click', () => {
      lightboxImg.src = img.src;
      lightbox.classList.add('open');
    });
  });
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// Close reaction pickers on outside click

// ── Send Message ──
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text && !pendingImageFile) return;
  const room = currentView === 'room' ? findRoom(currentRoom) : null;
  if (room?.type === 'private' && !isRoomMember(room)) {
    toast('You are not a member of this private group', 'error');
    return;
  }
  const expiresAt = buildExpiresAt(currentView === 'room' ? getDisappearMs(room?.settings) : 0);

  const msgData = {
    uid: currentUser.uid,
    sender: currentUser.uid,
    username: currentUserData.username,
    displayName: currentUserData.displayName,
    photoURL: currentUserData.photoURL || '',
    text: text,
    timestamp: serverTimestamp(),
    reactions: {},
    roomId: currentView === 'room' ? currentRoom : 'global'
  };
  if (expiresAt) msgData.expiresAt = expiresAt;

  // Upload image if pending
  if (pendingImageFile) {
    try {
      const imgRef = storageRef(storage, `chat-images/${Date.now()}-${pendingImageFile.name}`);
      await uploadBytes(imgRef, pendingImageFile);
      msgData.imageUrl = await getDownloadURL(imgRef);
    } catch(e) {
      // Storage might not be enabled; use data URL as fallback
      msgData.imageUrl = pendingImageDataUrl;
    }
    clearImagePreview();
  }

  msgInput.value = '';
  autoResizeTextarea(msgInput);

  try {
    if (currentView === 'global') {
      await addDoc(collection(db, 'messages'), msgData);
    } else {
      await addDoc(collection(db, 'rooms', currentRoom, 'messages'), msgData);
    }
    clearTypingIndicator();
  } catch(e) {
    toast('Failed to send message', 'error');
    console.error(e);
  }
}

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function getDmId(uid1, uid2) {
  return [uid1, uid2].sort().join('_');
}

function subscribeDmMessages() {
  if (unsubDmMessages) unsubDmMessages();
  if (!currentDmUid) return;
  const dmId = getDmId(currentUser.uid, currentDmUid);
  let dmMuted = false;
  getDoc(doc(db, 'dms', dmId)).then(snap => {
    dmMuted = Boolean(snap.data()?.mutedBy?.[currentUser.uid]);
  }).catch(() => {});
  cleanupExpiredMessages(collection(db, 'dms', dmId, 'messages'));
  const q = query(collection(db, 'dms', dmId, 'messages'), orderBy('timestamp', 'asc'), limit(100));
  dmMessages.innerHTML = '';
  let initialLoad = true;
  unsubDmMessages = onSnapshot(q, (snap) => {
    snap.docChanges().forEach(change => {
      if (change.type === 'added') {
        const data = change.doc.data();
        if (isExpiredMessage(data)) {
          deleteDoc(doc(db, 'dms', dmId, 'messages', change.doc.id)).catch(() => {});
          return;
        }
        renderDmMessage(change.doc.id, data);
        scrollToBottom(dmMessages);
        if (!initialLoad && !dmMuted) {
          maybeNotifyMessage({ username: data.username, text: data.text || 'Image', uid: data.uid, type: 'direct' });
        }
      }
      if (change.type === 'removed') {
        const el = document.getElementById(`dm-msg-${change.doc.id}`);
        if (el) el.remove();
      }
    });
    initialLoad = false;
  });

  // DM typing
  const typingRef = collection(db, 'dms', dmId, 'typing');
  onSnapshot(typingRef, (snap) => {
    const typers = [];
    snap.forEach(d => {
      const td = d.data();
      if (td.uid !== currentUser.uid && Date.now() - (td.ts?.toMillis?.() || 0) < 5000) typers.push(td.username);
    });
    dmTypingArea.innerHTML = typers.length > 0
      ? `${typers.join(', ')} is typing <span class="typing-dots"><span></span><span></span><span></span></span>`
      : '';
  });
}

function renderDmMessage(id, data) {
  const isMine = data.uid === currentUser.uid;
  const row = document.createElement('div');
  row.className = `msg-row ${isMine ? 'mine' : ''}`;
  row.id = `dm-msg-${id}`;
  const avatarSrc = data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.username||'U')}&background=3b82f6&color=fff`;
  row.innerHTML = `
    <img class="msg-avatar" src="${avatarSrc}" alt="${data.username}" />
    <div class="msg-bubble-wrap">
      ${!isMine ? `<div class="msg-sender-name">${escapeHtml(data.username||'')}</div>` : ''}
      <div class="msg-bubble">
        ${data.text ? `<span>${escapeHtml(data.text)}</span>` : ''}
        ${data.imageUrl ? `<img class="msg-image" src="${data.imageUrl}" alt="img" />` : ''}
      </div>
      <div class="msg-meta"><span class="msg-time">${formatTime(data.timestamp)}</span></div>
    </div>`;
  dmMessages.appendChild(row);
  row.querySelectorAll('.msg-image').forEach(img => {
    img.addEventListener('click', () => { lightboxImg.src = img.src; lightbox.classList.add('open'); });
  });
}

async function cleanupExpiredMessages(messagesColl) {
  try {
    const snap = await getDocs(query(messagesColl, orderBy('timestamp', 'asc'), limit(100)));
    snap.forEach(d => {
      if (isExpiredMessage(d.data())) deleteDoc(d.ref).catch(() => {});
    });
  } catch {}
}

async function sendDmMessage() {
  const text = dmInput.value.trim();
  if (!text || !currentDmUid) return;
  const dmId = getDmId(currentUser.uid, currentDmUid);
  const dmMeta = await getDoc(doc(db, 'dms', dmId)).catch(() => null);
  const settings = dmMeta?.exists?.() ? (dmMeta.data().settings || {}) : {};
  const expiresAt = buildExpiresAt(getDisappearMs(settings));
  dmInput.value = '';
  const msgData = {
    uid: currentUser.uid,
    sender: currentUser.uid,
    username: currentUserData.username,
    photoURL: currentUserData.photoURL || '',
    text,
    timestamp: serverTimestamp()
  };
  if (expiresAt) msgData.expiresAt = expiresAt;

  await setDoc(doc(db, 'dms', dmId), {
    participants: [currentUser.uid, currentDmUid],
    lastMessage: text,
    lastSender: currentUser.uid,
    mutedBy: dmMeta?.exists?.() ? (dmMeta.data().mutedBy || {}) : {},
    settings,
    updatedAt: serverTimestamp()
  }, { merge: true });
  await addDoc(collection(db, 'dms', dmId, 'messages'), msgData);
}

dmSendBtn.addEventListener('click', sendDmMessage);
dmInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendDmMessage(); } });
dmInput.addEventListener('input', () => {
  if (!currentDmUid) return;
  const dmId = getDmId(currentUser.uid, currentDmUid);
  const typingRef = collection(db, 'dms', dmId, 'typing');
  setDoc(doc(typingRef, currentUser.uid), { uid: currentUser.uid, username: currentUserData.username, ts: serverTimestamp() });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => deleteDoc(doc(typingRef, currentUser.uid)).catch(()=>{}), 4000);
});

async function loadDmList() {
  dmList.innerHTML = '';
  const q = query(collection(db, 'dms'), where('participants', 'array-contains', currentUser.uid), orderBy('updatedAt', 'desc'));
  try {
    const snap = await getDocs(q);
    if (snap.empty) {
      dmList.innerHTML = '<p style="font-size:0.82rem;color:var(--muted);padding:8px 6px;">No DMs yet. Search for a user above.</p>';
      return;
    }
    for (const d of snap.docs) {
      const data = d.data();
      const otherUid = data.participants.find(p => p !== currentUser.uid);
      if (!otherUid) continue;
      const userSnap = await getDoc(doc(db, 'users', otherUid));
      if (!userSnap.exists()) continue;
      const u = userSnap.data();
      const row = document.createElement('div');
      row.className = 'dm-row'; row.dataset.uid = u.uid;
      const avatarSrc = u.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(u.username||'U')}&background=3b82f6&color=fff`;
      row.innerHTML = `
        <img class="dm-row-avatar" src="${avatarSrc}" alt="${u.username}" />
        <div style="min-width:0;">
          <div class="dm-row-name">${u.username}</div>
          <div class="dm-row-preview">${data.mutedBy?.[currentUser.uid] ? 'Muted · ' : ''}${data.lastMessage||''}</div>
        </div>`;
      row.addEventListener('click', () => openDmWithUser(u));
      attachDmLongPress(row, d.id, u);
      dmList.appendChild(row);
    }
  } catch(e) {
    dmList.innerHTML = '<p style="font-size:0.82rem;color:var(--muted);padding:8px 6px;">Start a new DM above.</p>';
  }
}

function attachDmLongPress(row, dmId, user) {
  let timer = null;
  let startX = 0;
  let startY = 0;
  const clear = () => {
    clearTimeout(timer);
    timer = null;
  };
  const open = (event) => {
    event.preventDefault();
    row.dataset.dmId = dmId;
    row.dataset.uid = user.uid;
    openDmContextMenu(event, dmId, user);
  };
  row.addEventListener('pointerdown', (event) => {
    if (event.button !== undefined && event.button !== 0) return;
    startX = event.clientX;
    startY = event.clientY;
    clear();
    timer = setTimeout(() => open(event), 3000);
  });
  row.addEventListener('pointermove', (event) => {
    if (Math.abs(event.clientX - startX) > 12 || Math.abs(event.clientY - startY) > 12) clear();
  });
  row.addEventListener('pointerup', clear);
  row.addEventListener('pointercancel', clear);
  row.addEventListener('contextmenu', (event) => open(event));
}

function openDmContextMenu(event, dmId, user) {
  dmContextMenu.dataset.dmId = dmId;
  dmContextMenu.dataset.uid = user.uid;
  const x = Math.min(event.clientX || 16, window.innerWidth - 250);
  const y = Math.min(event.clientY || 16, window.innerHeight - 130);
  dmContextMenu.style.left = `${Math.max(12, x)}px`;
  dmContextMenu.style.top = `${Math.max(12, y)}px`;
  dmContextMenu.classList.add('open');
}

document.addEventListener('click', (event) => {
  if (!dmContextMenu.contains(event.target)) dmContextMenu.classList.remove('open');
});

dmContextMenu.addEventListener('click', async (event) => {
  const action = event.target.closest('button')?.dataset.action;
  if (!action) return;
  const dmId = dmContextMenu.dataset.dmId;
  dmContextMenu.classList.remove('open');
  if (action === 'mute') {
    await toggleDmMute(dmId);
  } else if (action === 'disappear') {
    await setDmDisappearMode(dmId);
  }
});

async function toggleDmMute(dmId) {
  const ref = doc(db, 'dms', dmId);
  const snap = await getDoc(ref);
  const muted = Boolean(snap.data()?.mutedBy?.[currentUser.uid]);
  if (muted) await updateDoc(ref, { [`mutedBy.${currentUser.uid}`]: deleteField() });
  else await setDoc(ref, { [`mutedBy.${currentUser.uid}`]: true }, { merge: true });
  toast(muted ? 'Chat unmuted' : 'Chat muted', 'success');
  loadDmList();
}

async function setDmDisappearMode(dmId) {
  const current = await getDoc(doc(db, 'dms', dmId));
  const existing = String(getDisappearMs(current.data()?.settings || {}));
  const choice = prompt('Disappearing messages: 0 = Off, 24h, 7d, or 30d', DISAPPEAR_OPTIONS[existing] || 'Off');
  const normalized = String(choice || '').toLowerCase().replace(/\s+/g, '');
  const map = { '0': 0, off: 0, '24h': 86400000, '24hours': 86400000, '7d': 604800000, '7days': 604800000, '30d': 2592000000, '30days': 2592000000 };
  if (!(normalized in map)) return;
  await setDoc(doc(db, 'dms', dmId), { 'settings.disappearMs': map[normalized] }, { merge: true });
  toast(`Disappearing messages: ${DISAPPEAR_OPTIONS[map[normalized]]}`, 'success');
}

// ── Notes ──
let unsubNotes = null;
function openNotesPanel() {
  notesPanel.classList.add('open');
  subscribeNotes();
}
document.getElementById('notes-back').addEventListener('click', () => notesPanel.classList.remove('open'));

function subscribeNotes() {
  if (unsubNotes) unsubNotes();
  const q = query(collection(db, 'users', currentUser.uid, 'notes'), orderBy('createdAt', 'desc'));
  unsubNotes = onSnapshot(q, (snap) => {
    notesList.innerHTML = '';
    if (snap.empty) {
      notesList.innerHTML = '<p style="font-size:0.85rem;color:var(--muted);text-align:center;margin-top:24px;">No notes yet. Add your first one!</p>';
      return;
    }
    snap.forEach(d => {
      const data = d.data();
      const card = document.createElement('div');
      card.className = 'note-card';
      card.innerHTML = `
        <button class="note-del" data-id="${d.id}">✕</button>
        <div class="note-text">${escapeHtml(data.text)}</div>
        <div class="note-time">${formatTime(data.createdAt)}</div>`;
      card.querySelector('.note-del').addEventListener('click', async (e) => {
        await deleteDoc(doc(db, 'users', currentUser.uid, 'notes', e.target.dataset.id));
        toast('Note deleted', 'success');
      });
      notesList.appendChild(card);
    });
  });
}

noteAddBtn.addEventListener('click', async () => {
  const text = noteInput.value.trim();
  if (!text) return;
  await addDoc(collection(db, 'users', currentUser.uid, 'notes'), { text, createdAt: serverTimestamp() });
  noteInput.value = '';
  toast('Note saved', 'success');
});
noteInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && e.ctrlKey) noteAddBtn.click(); });

// ── Profile Modal ──
profileBtn.addEventListener('click', () => {
  profileAvatarBig.src = currentUserData.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUserData.username||'U')}&background=3b82f6&color=fff`;
  profileUsernameInput.value = currentUserData.username || '';
  profileDisplayInput.value = currentUserData.displayName || '';
  profileEmailInput.value = currentUserData.email || '';
  profileModal.classList.add('open');
});
profileCancelBtn.addEventListener('click', () => profileModal.classList.remove('open'));
profileModal.addEventListener('click', (e) => { if (e.target === profileModal) profileModal.classList.remove('open'); });
profileSaveBtn.addEventListener('click', async () => {
  const newUsername = profileUsernameInput.value.trim();
  const newDisplay  = profileDisplayInput.value.trim();
  if (!newUsername) { toast('Username required', 'error'); return; }
  await setDoc(doc(db, 'users', currentUser.uid), {
    username: newUsername, displayName: newDisplay
  }, { merge: true });
  currentUserData.username = newUsername;
  currentUserData.displayName = newDisplay;
  localStorage.setItem('zap_username', newUsername);
  navUsername.textContent = newUsername;
  profileModal.classList.remove('open');
  toast('Profile updated!', 'success');
});

// ── Logout ──
logoutBtn.addEventListener('click', async () => {
  await setDoc(doc(db, 'users', currentUser.uid), { online: false, lastSeen: serverTimestamp() }, { merge: true });
  await signOut(auth);
  localStorage.removeItem('zap_username');
  localStorage.removeItem('zap_uid');
  window.location.href = 'index.html';
});

// ── Browser Notifications ──
function initNotifications() {
  notificationsEnabled = localStorage.getItem('zap_notifications') === 'true';
  notifyGroupMessages = localStorage.getItem('zap_notify_groups') !== 'false';
  updateNotificationButton();
  updateGroupNotificationButton();

  notifyToggleBtn.addEventListener('click', async () => {
    if (!('Notification' in window)) {
      toast('Notifications are not supported in this browser', 'error');
      return;
    }
    if (Notification.permission !== 'granted') {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        notificationsEnabled = false;
        localStorage.setItem('zap_notifications', 'false');
        updateNotificationButton();
        return;
      }
    }
    notificationsEnabled = !notificationsEnabled;
    localStorage.setItem('zap_notifications', String(notificationsEnabled));
    updateNotificationButton();
    if (notificationsEnabled) await registerPhoneNotificationTarget();
    toast(notificationsEnabled ? 'Notifications enabled' : 'Notifications muted', 'success');
  });

  notifyGroupsToggleBtn.addEventListener('click', () => {
    notifyGroupMessages = !notifyGroupMessages;
    localStorage.setItem('zap_notify_groups', String(notifyGroupMessages));
    updateGroupNotificationButton();
  });
}

async function registerPhoneNotificationTarget() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const subscription = await reg.pushManager?.getSubscription?.();
    if (subscription && currentUser) {
      await setDoc(doc(db, 'users', currentUser.uid), {
        pushSubscriptions: { [btoa(subscription.endpoint).slice(0, 32)]: subscription.toJSON() }
      }, { merge: true });
    }
  } catch {}
}

function updateNotificationButton() {
  if (!notifyToggleBtn) return;
  notifyToggleBtn.classList.toggle('enabled', notificationsEnabled);
  notifyToggleBtn.textContent = notificationsEnabled ? '🔔 Notifications On' : '🔕 Notifications';
}

function updateGroupNotificationButton() {
  if (!notifyGroupsToggleBtn) return;
  notifyGroupsToggleBtn.classList.toggle('enabled', notifyGroupMessages);
  notifyGroupsToggleBtn.textContent = notifyGroupMessages ? '# Room Alerts On' : '# Room Alerts Off';
}

async function maybeNotifyMessage({ username, text, uid, type, room }) {
  if (!document.hidden || uid === currentUser?.uid || !notificationsEnabled) return;
  if (!('Notification' in window) || Notification.permission !== 'granted') return;

  const isDirect = type === 'direct';
  const isMention = currentUserData?.username && text.toLowerCase().includes(`@${currentUserData.username.toLowerCase()}`);
  const isGroup = type === 'room';
  if (!isDirect && !isMention && !(isGroup && notifyGroupMessages)) return;

  const title = isDirect ? 'Zap direct message' : isMention ? 'Zap mention' : `Zap room: ${room || 'chat'}`;
  const options = {
    body: `${username || 'Someone'}: ${text}`,
    icon: 'icon-192.png',
    badge: 'icon-192.png',
    tag: isDirect ? 'zap-dm' : `zap-${room || 'global'}`,
    data: { url: 'dashboard.html', type, room }
  };

  try {
    const reg = await navigator.serviceWorker?.ready;
    if (reg?.showNotification) {
      await reg.showNotification(title, options);
      return;
    }
  } catch {}

  new Notification(title, options);
}

// ── Lightbox ──
lightbox.addEventListener('click', () => lightbox.classList.remove('open'));

// ── PWA Install + Service Worker ──
function initPWA() {
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

  if (installBtn) {
    installBtn.style.display = isIOS && !isStandalone ? 'flex' : 'none';
    installBtn.addEventListener('click', async () => {
      if (isIOS && !deferredInstallPrompt) {
        alert('To install Zap on iPhone or iPad:\n\n1. Tap the Share button\n2. Scroll down\n3. Tap Add to Home Screen');
        return;
      }
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      const choice = await deferredInstallPrompt.userChoice.catch(() => ({ outcome: 'dismissed' }));
      deferredInstallPrompt = null;
      installBtn.style.display = 'none';
      if (choice.outcome === 'accepted') toast('Zap is installing', 'success');
    });
  }

  window.addEventListener('beforeinstallprompt', (event) => {
    event.preventDefault();
    deferredInstallPrompt = event;
    if (installBtn && !isStandalone) installBtn.style.display = 'flex';
  });

  window.addEventListener('appinstalled', () => {
    deferredInstallPrompt = null;
    if (installBtn) installBtn.style.display = 'none';
    toast('Zap installed', 'success');
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch((err) => console.warn('Service worker registration failed', err));
  }
}

// ── Init ──
function initUI() {
  initPWA();
  initNotifications();
  initContextMenus();
  initDisappearMode();
}

function initChat() {
  subscribeMessages();
  subscribeOnlineUsers();
}

function initDMs() {
  loadDmList();
}

function initContextMenus() {
  dmContextMenu.classList.remove('open');
}

function initDisappearMode() {
  cleanupExpiredMessages(collection(db, 'messages'));
}

function initApp() {
  initGroups();
  initChat();
  initDMs();
}

window.addEventListener('DOMContentLoaded', initUI);
</script>
